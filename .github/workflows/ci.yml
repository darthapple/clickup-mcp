# Runs unit + integration tests only (see README's Testing section for the
# full four-tier breakdown). The e2e (build tag `e2e`) and smoke (build tag
# `smoke`) suites hit the real ClickUp API and are intentionally NOT run
# here — they're local-only for now, since running them here would require
# storing a real ClickUp API token as a GitHub Actions secret.
name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.4"

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: gofmt
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "The following files are not gofmt-formatted:"
            echo "$unformatted"
            exit 1
          fi

      - name: Test
        run: go test ./... -race -cover
